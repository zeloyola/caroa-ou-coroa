<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Cara ou Coroa</title>
    <link rel="stylesheet" href="estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <header>
        <h1>
            Jogo do Cara ou Coroa
        </h1>
    </header>
    <section>
        <div id="visor">
            <p>
                Escolha suas opções... (Cara ou Coroa)
            </p>
        </div>

        <button onclick="sortear()" class="btn  btn-success">Clique para iniciar!</button>
    </section>

    <script>

        const visor = document.querySelector('#visor')

        function sortear() {
            const R = Math.random()
            const valorSorteado = R >= 0.5
            const resultado = valorSorteado ? 'Cara' : 'Coroa'
            console.log(resultado)

            visor.innerHTML = resultado
        }


    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
